site_name: ChronoMap
site_description: Production-grade time-versioned key-value store for Python
site_url: https://devansh-567.github.io/chronomap
repo_url: https://github.com/Devansh-567/chronomap
repo_name: Devansh-567/chronomap
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
    - Installation: guide/installation.md
    - Quick start: guide/quickstart.md
    - Configuration: guide/configuration.md
  - Features:
    - Time travel: guide/time-travel.md
    - Snapshots & rollback: guide/snapshots.md
    - TTL & expiration: guide/ttl.md
    - Async support: guide/async.md
    - Persistence: guide/persistence.md
  - API reference:
    - ChronoMap: api/chronomap.md
    - AsyncChronoMap: api/async-chronomap.md
    - Exceptions: api/exceptions.md
  - Examples:
    - Configuration management: examples/config.md
    - Session store: examples/sessions.md
    - Metrics collector: examples/metrics.md
    - Feature flags: examples/feature-flags.md
    - Cache manager: examples/cache.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Devansh-567/chronomap
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/chronomap/
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]
