name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed subsystems
    runs-on: ubuntu-latest
    outputs:
      markers: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'src/chronomap/core.py'
              - 'src/chronomap/__init__.py'
              - 'src/chronomap/exceptions.py'
              - 'tests/test_chronomap.py'
              - 'tests/test_basic.py'
              - 'tests/test_coverage_gaps.py'
            cache:
              - 'src/chronomap/_cache.py'
            lock:
              - 'src/chronomap/_lock.py'
            memory:
              - 'src/chronomap/_memory.py'
            ttl:
              - 'src/chronomap/_ttl_cleanup.py'
            snapshot:
              - 'src/chronomap/_snapshot.py'
            async_map:
              - 'src/chronomap/asynchronous.py'
            cli:
              - 'src/chronomap/cli.py'
              - 'tests/test_cli.py'

  modules:
    name: "Subsystem: ${{ matrix.marker }}"
    needs: changes
    if: needs.changes.outputs.markers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        marker: ${{ fromJson(needs.changes.outputs.markers) }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev + pandas extras
        run: pip install -e ".[dev,pandas]"

      - name: Run ${{ matrix.marker }} tests only
        run: pytest tests/ -v -m "${{ matrix.marker }}"

  test:
    name: Python ${{ matrix.python-version }} (full suite)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev + pandas extras
        run: pip install -e ".[dev,pandas]"

      - name: Run tests
        run: pytest tests/ -v --cov=chronomap --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Formatting (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install black
        run: pip install black>=23.0

      - name: Check formatting
        run: black --check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/chronomap --ignore-missing-imports
        continue-on-error: true
