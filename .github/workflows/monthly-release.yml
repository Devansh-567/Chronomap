name: Monthly release notes

# Runs at 00:00 UTC on the 1st of every month, covering the previous
# calendar month. Can also be triggered by hand from the Actions tab.
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to cut (e.g. 3.1.0). Leave blank to auto patch-bump the current version.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compute date window (previous calendar month)
        id: window
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          from datetime import date
          today = date.today()
          first_of_this_month = today.replace(day=1)
          last_month_end = first_of_this_month
          last_month_start = (first_of_this_month.replace(day=1) - __import__("datetime").timedelta(days=1)).replace(day=1)
          print(f"since={last_month_start.isoformat()}")
          print(f"until={last_month_end.isoformat()}")
          EOF

      - name: Compute next version (auto patch-bump unless manually overridden)
        id: current_version
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import re

          manual = "${{ github.event.inputs.version }}".strip()
          current = re.search(r'__version__ = "(.+)"', open("src/chronomap/_version.py").read()).group(1)

          if manual:
              print(f"version={manual}")
          else:
              major, minor, patch = (int(p) for p in current.split("."))
              print(f"version={major}.{minor}.{patch + 1}")
          EOF

      - name: Generate native release notes (includes PR authors + new contributors)
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.current_version.outputs.version }}"
          BODY=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG" \
            --jq '.body')
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (with contributor credit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --target main

      - name: Build name-free CHANGELOG.md entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/build_changelog_entry.py \
            --repo "${{ github.repository }}" \
            --token "$GH_TOKEN" \
            --since "${{ steps.window.outputs.since }}" \
            --until "${{ steps.window.outputs.until }}" \
            --version "${{ steps.current_version.outputs.version }}"

      - name: Bump _version.py to match the cut release
        run: |
          NEW_VERSION="${{ steps.current_version.outputs.version }}"
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" src/chronomap/_version.py

      - name: Open PR with the CHANGELOG + version bump
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(release): ${{ steps.notes.outputs.tag }}"
          title: "Release ${{ steps.notes.outputs.tag }}: CHANGELOG + version bump"
          body: >
            Automated monthly release housekeeping for ${{ steps.notes.outputs.tag }}.
            Full release notes with contributor credit are already published on the
            [GitHub Release](../../releases/tag/${{ steps.notes.outputs.tag }}) —
            this PR just syncs CHANGELOG.md and _version.py. Please review before merging.
          branch: "changelog/${{ steps.notes.outputs.tag }}"
          add-paths: |
            CHANGELOG.md
            src/chronomap/_version.py
