name: Feature request
description: Suggest an addition or change to ChronoMap.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that ChronoMap doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behavior
      description: >
        Sketch the shape you'd want, e.g. a method signature or usage
        example. Doesn't need to be final.
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using now, or other libraries that do this.
