name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Please check the [roadmap](https://github.com/Devansh-567/chronomap/blob/main/CHANGELOG.md) first to see if it's already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I often need to query all keys that existed at a specific time, but there's no bulk time-travel API."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like it to work, with example code if possible.
      render: python
      placeholder: |
        cm.snapshot_at(timestamp)  # returns a new ChronoMap with all keys at that point
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're using today.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would unblock my use case
        - Critical — blocking production use

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this feature.
